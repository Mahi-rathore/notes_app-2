{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;

            background:
                url("{% static 'images/notes.png' %}") no-repeat bottom right,
                linear-gradient(120deg, #eef2f7, #d9e2ec, #f5f7fa);

            background-size: 240px, cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            width: 380px;
            padding: 45px 35px;
            border-radius: 14px;

            background: rgba(255,255,255,0.95);

            box-shadow:
                0 10px 25px rgba(0,0,0,0.08),
                0 2px 6px rgba(0,0,0,0.05);

            text-align: center;
        }

        h2 {
            font-size: 26px;
            font-weight: 600;
            color: #1f2d3d;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 13px;
            color: #6b7c93;
            margin-bottom: 20px;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        input {
            width: 92%;
            padding: 14px;
            margin: 12px 0;

            border-radius: 8px;
            border: 1px solid #d1d9e6;

            background: #f9fbfd;
            font-size: 14px;
        }

        input:focus {
            border: 1px solid #2f80ed;
            box-shadow: 0 0 0 2px rgba(47,128,237,0.1);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;

            background: linear-gradient(135deg, #2f80ed, #56ccf2);
            color: white;

            border: none;
            border-radius: 8px;

            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(47,128,237,0.3);
        }

        p {
            margin-top: 18px;
            font-size: 14px;
        }

        a {
            color: #2f80ed;
            text-decoration: none;
            font-weight: 500;
        }

    </style>
</head>

<body>

<div class="box">
    <h2>Create Account</h2>
    <p class="subtitle">Join us and start saving your notes</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Signup</button>
    </form>

    <p>Already have an account? <a href="/login/">Login</a></p>
</div>

</body>
</html>
